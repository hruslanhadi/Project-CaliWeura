# =====================================================
# PROMETHEUS CONFIGURATION
# =====================================================
# Monitoring configuration for data platform

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'data-platform'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Airflow Scheduler
  - job_name: 'airflow-scheduler'
    static_configs:
      - targets: ['airflow-scheduler:8974']
    metrics_path: '/metrics'

  # Airflow Webserver
  - job_name: 'airflow-webserver'
    static_configs:
      - targets: ['airflow-web:8080']
    metrics_path: '/metrics'

  # Spark Master
  - job_name: 'spark-master'
    static_configs:
      - targets: ['spark_master:8080']

  # PostgreSQL (via postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Node Exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

  # Redis (via redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Kafka (via kafka_exporter)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']
