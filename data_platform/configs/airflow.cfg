# =====================================================
# AIRFLOW CONFIGURATION FILE (airflow.cfg)
# =====================================================
# Apache Airflow configuration with security and production best practices
# Override with environment variables: AIRFLOW__<section>__<key>=value

[core]
# Base directory for all DAGs
dags_folder = /opt/airflow/dags

# Base directory for logs
base_log_folder = /opt/airflow/logs

# Database connection string
# Override with AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
sql_alchemy_conn = postgresql+psycopg2://airflow_meta:password@postgres:5432/airflow

# Executor type: LocalExecutor (dev), CeleryExecutor (production)
# Override with AIRFLOW__CORE__EXECUTOR
executor = LocalExecutor

# Load example DAGs
load_examples = False

# Load default connections from environment
load_default_connections = False

# Logging level
logging_level = INFO

# Task concurrency
# Maximum number of tasks to run in parallel per DAG
max_active_runs_per_dag = 1
parallelism = 4
dag_concurrency = 2

# Dag discovery interval in seconds
dag_dir_list_interval = 300

# Whether to serialize DAGs to DB
store_dag_code = True

# Store serialized DAGs for performance
dagbag_import_timeout = 30

# When Airflow stops responding to signal (in seconds)
execution_timeout = 300

# Hostname to run webserver on
hostname = airflow

# FAQs
faq_url =

# Feature flags
enable_xcom_pickling = False

# Dask configuration
dask_client_timeout = 30

# Enable dag backfill
dag_backfill_enabled = True

[logging]
# Logging level
logging_level = INFO

# Log format
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s

# Log filename format
log_filename_template = {{ ti.dag_id }}/{{ ti.task_id }}/{{ ts }}/{{ try_number }}.log

# Base logs directory
base_log_folder = /opt/airflow/logs

# Create log directory if it doesn't exist
base_logdir = /opt/airflow/logs

[webserver]
# Webserver host and port
web_server_host = 0.0.0.0
web_server_port = 8080

# Number of workers for gunicorn
workers = 4

# Worker timeout
web_server_worker_timeout = 120

# RBAC (Role Based Access Control)
rbac = True

# Expose config for debugging (disable in production)
expose_config = False

# Expose environment variables for debugging
expose_env = False

# Enable web UI authentication
authenticate = True

# Authentication backend
auth_backend = airflow.contrib.auth.backends.password_auth

# Session configuration
session_lifetime_minutes = 1440

# Max number of rows displayed in UI
max_rows = 5000

[scheduler]
# Scheduler heartbeat interval (seconds)
scheduler_heartbeat_interval = 30

# Number of processes for SchedulerJob
max_threads = 2

# DAG directory list interval
dag_dir_list_interval = 300

# Parsing interval
min_file_process_interval = 30

# Catchup by default
catchup_by_default = False

# Check timetable every X seconds
timetable_check_interval = 60

# Dag processor manager interval
dag_processor_manager_interval = 1

# Statsd configuration
statsd_on = False

[database]
# Database configuration
sql_alchemy_conn = postgresql+psycopg2://airflow_meta:password@postgres:5432/airflow

# Pool size for SQLAlchemy
sql_alchemy_pool_size = 5

# Max overflow for SQLAlchemy
sql_alchemy_max_overflow = 10

# Pool pre-ping
sql_alchemy_pool_pre_ping = True

# Pool recycle (seconds)
sql_alchemy_pool_recycle = 3600

# Connection pooling enabled
sql_alchemy_conn_pool_enabled = True

[celery]
# Celery broker URL (for CeleryExecutor)
broker_url = redis://redis:6379/0

# Celery result backend
result_backend = db+postgresql://airflow_meta:password@postgres:5432/airflow

# Celery worker concurrency
worker_concurrency = 4

# Task time limit (seconds)
task_time_limit = 300

# Task soft time limit (seconds)
task_soft_time_limit = 240

# Worker log level
worker_log_level = INFO

# Celery sync mode
celery_sync_mode = False

[email]
# Email configuration
email_backend = airflow.providers.smtp.utils.EmailBackend

# SMTP configuration
smtp_host = localhost
smtp_port = 25
smtp_user = airflow
smtp_password = airflow
smtp_mail_from = airflow@example.com

[smtp]
# SMTP configuration (alternative format)
smtp_host = localhost
smtp_starttls = True
smtp_ssl = False
smtp_user = airflow
smtp_password = airflow
smtp_port = 25
smtp_mail_from = airflow@example.com

[security]
# Secret key for webserver (override with AIRFLOW__WEBSERVER__SECRET_KEY)
secret_key = change_me

# FERNET_KEY for encrypting connections/variables (override with env var FERNET_KEY)
fernet_key = 

# Require authentication
require_authentication = True

# Enable HTTPS
enable_ssl = False

# SSL certificate path
ssl_cert_path = 

# SSL key path
ssl_key_path = 

[api]
# Enable REST API
enable_experimental_api = False

# API auth backend
api_auth_backend = airflow.api.auth.backend.default

[operators]
# Default owner for DAGs
default_owner = airflow

# Default view in Airflow UI
default_view = tree

# Default DAG orientation
default_dag_orientation = LR

[hive]
# Hive configuration (if using)
hive_cli_path = /usr/bin/hive

[gcp]
# Google Cloud Platform configuration

[github_enterprise]
# GitHub Enterprise configuration

[livy]
# Livy configuration

[spark]
# Spark configuration
java_home = /usr/lib/jvm/java-17-openjdk-amd64

# Spark binary location
spark_home = /opt/spark

# Default Spark master URL
master = spark://spark_master:7077

[kubernetes]
# Kubernetes configuration (if using KubernetesExecutor)

[kubernetes_labels]
# Kubernetes labels

[sentry]
# Sentry configuration (for error tracking)

[profile]
# Profiling settings
