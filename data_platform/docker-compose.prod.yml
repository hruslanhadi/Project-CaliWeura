services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_users.sh:/docker-entrypoint-initdb.d/01-init_users.sh:ro
      - ./scripts/init_db.sh:/docker-entrypoint-initdb.d/02-init_db.sh:ro
      - ./scripts/init_warehouse.sh:/docker-entrypoint-initdb.d/03-init_warehouse.sh:ro
      - ./backups:/backups
    mem_limit: 4g
    cpus: 2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: always
    networks:
      - dp_backend
      - dp_data

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    env_file:
      - .env.production
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
      - ./backups/minio:/minio/backups
    ports:
      - "9001:9001"
    mem_limit: 2g
    cpus: 1.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: always
    networks:
      - dp_data

  spark-master:
    image: bitnami/spark:3.4.1
    env_file:
      - .env.production
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: no
      SPARK_RPC_ENCRYPTION_ENABLED: no
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: no
      SPARK_SSL_ENABLED: no
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8081:8080"
    volumes:
      - ./spark_jobs:/opt/spark/jobs:ro
      - ./data:/opt/airflow/data:ro
      - spark_logs:/opt/bitnami/spark/logs
    mem_limit: 2g
    cpus: 1
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://localhost:8080 >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: always
    networks:
      - dp_data

  spark-worker:
    image: bitnami/spark:3.4.1
    env_file:
      - .env.production
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: ${SPARK_MASTER}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
      SPARK_RPC_AUTHENTICATION_ENABLED: no
      SPARK_RPC_ENCRYPTION_ENABLED: no
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: no
      SPARK_SSL_ENABLED: no
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./spark_jobs:/opt/spark/jobs:ro
      - ./data:/opt/airflow/data:ro
      - spark_logs:/opt/bitnami/spark/logs
    mem_limit: 8g
    cpus: 4
    restart: always
    networks:
      - dp_data

  redis:
    image: redis:7-alpine
    env_file:
      - .env.production
    command: redis-server --requirepass ${REDIS_PASSWORD}
    mem_limit: 1g
    cpus: 1
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - dp_backend
    volumes:
      - redis_data:/data

  airflow-init:
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
      AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: ${AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      AIRFLOW_CONN_POSTGRES_WAREHOUSE: ${AIRFLOW_CONN_POSTGRES_WAREHOUSE}
      AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT}
      AIRFLOW_CONN_MINIO_DEFAULT: ${AIRFLOW_CONN_MINIO_DEFAULT}
      AIRFLOW_VAR_PLATFORM_ENV: ${ENVIRONMENT}
    entrypoint: >
      bash -lc "
      airflow db upgrade &&
      airflow users create
        --username admin
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@airflow.local
        --password ${AIRFLOW_ADMIN_PASSWORD} || true
      "
    restart: "no"
    networks:
      - dp_backend
      - dp_data

  airflow-web:
    env_file:
      - .env.production
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
      AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: ${AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      AIRFLOW_CONN_POSTGRES_WAREHOUSE: ${AIRFLOW_CONN_POSTGRES_WAREHOUSE}
      AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT}
      AIRFLOW_CONN_MINIO_DEFAULT: ${AIRFLOW_CONN_MINIO_DEFAULT}
      AIRFLOW_VAR_PLATFORM_ENV: ${ENVIRONMENT}
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - ./spark_jobs:/opt/airflow/spark_jobs:ro
      - ./scripts:/opt/airflow/scripts:ro
      - ./configs:/opt/airflow/configs:ro
      - ./data:/opt/airflow/data:ro
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    mem_limit: 2g
    cpus: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    networks:
      - dp_backend
      - dp_frontend
      - dp_data

  airflow-scheduler:
    env_file:
      - .env.production
    depends_on:
      airflow-web:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
      AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: ${AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      AIRFLOW_CONN_POSTGRES_WAREHOUSE: ${AIRFLOW_CONN_POSTGRES_WAREHOUSE}
      AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT}
      AIRFLOW_CONN_MINIO_DEFAULT: ${AIRFLOW_CONN_MINIO_DEFAULT}
      AIRFLOW_VAR_PLATFORM_ENV: ${ENVIRONMENT}
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - ./spark_jobs:/opt/airflow/spark_jobs:ro
      - ./scripts:/opt/airflow/scripts:ro
      - ./configs:/opt/airflow/configs:ro
      - ./data:/opt/airflow/data:ro
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    mem_limit: 3g
    cpus: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    networks:
      - dp_backend
      - dp_data

  airflow-worker:
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
      airflow-web:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
      AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: ${AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      AIRFLOW_CONN_POSTGRES_WAREHOUSE: ${AIRFLOW_CONN_POSTGRES_WAREHOUSE}
      AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT}
      AIRFLOW_CONN_MINIO_DEFAULT: ${AIRFLOW_CONN_MINIO_DEFAULT}
      AIRFLOW_VAR_PLATFORM_ENV: ${ENVIRONMENT}
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - ./spark_jobs:/opt/airflow/spark_jobs:ro
      - ./scripts:/opt/airflow/scripts:ro
      - ./configs:/opt/airflow/configs:ro
      - ./data:/opt/airflow/data:ro
      - airflow_logs:/opt/airflow/logs
    command: celery worker --loglevel=info --concurrency=${AIRFLOW_WORKER_CONCURRENCY}
    mem_limit: 2g
    cpus: 2
    restart: always
    networks:
      - dp_backend
      - dp_data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    profiles: ["streaming"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_AUTOPURGE_SNAP_RETAIN_COUNT: 5
      ZOOKEEPER_AUTOPURGE_PURGE_INTERVAL: 1
    mem_limit: 512m
    cpus: 0.5
    restart: always
    networks:
      - dp_data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    profiles: ["streaming"]
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    mem_limit: 1g
    cpus: 1
    restart: always
    networks:
      - dp_data
