# version: "3.9"

services:

  # ----------------------
  # PostgreSQL
  # ----------------------
  postgres:
    image: postgres:15-alpine
    container_name: caliweura_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_secure_pass
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    mem_limit: 768m
    cpus: 0.7
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      retries: 5

  # ----------------------
  # MinIO (Data Lake)
  # ----------------------
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: caliweura_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secure_pass
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    mem_limit: 512m
    cpus: 0.5

  # ----------------------
  # Spark (Single Node)
  # ----------------------
  spark_master:
    image: bitnamilegacy/spark:3.4.1
    container_name: caliweura_spark_master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_MEMORY=1G
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./spark_jobs:/opt/spark/jobs
    mem_limit: 2g
    cpus: 1.2
  
  # ----------------------
  # Airflow build image
  # ----------------------
  x-airflow-image: &airflow-image
    image: caliweura-airflow:latest
    build:
      context: ./docker
      dockerfile: Dockerfile.airflow
    
  # ----------------------
  # Airflow Init
  # ----------------------
  airflow-init:
    <<: *airflow-image
    container_name: caliweura_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secure_pass@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    entrypoint: >
      sh -c "airflow db upgrade &&
             airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@airflow.local --password admin123 "
    restart: "no"

  # ----------------------
  # Airflow Webserver
  # ----------------------
  airflow-web:
    image: caliweura-airflow:latest
    container_name: caliweura_airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secure_pass@postgres/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./scripts:/opt/airflow/scripts
      - ./configs:/opt/airflow/configs
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    mem_limit: 1.5g
    cpus: 1

  # ----------------------
  # Airflow Scheduler
  # ----------------------
  airflow-scheduler:
    image: caliweura-airflow:latest
    container_name: caliweura_airflow_scheduler
    depends_on:
      airflow-web:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secure_pass@postgres/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./scripts:/opt/airflow/scripts
      - ./configs:/opt/airflow/configs
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    mem_limit: 1.5g
    cpus: 1

  # ----------------------
  # Kafka (OPTIONAL)
  # ----------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dp_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    mem_limit: 384m
    cpus: 0.3

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dp_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    mem_limit: 768m
    cpus: 0.7

volumes:
  postgres_data:
  minio_data:
  airflow_logs:
  spark_logs:
networks:
  default:
    name: dp_network