# ===================================================
# DOCKER-COMPOSE DEVELOPMENT
# ===================================================
# Optimized for 16GB RAM laptop
# LocalExecutor for single-machine execution
# Minimal resource allocation
# All services for full-stack testing

# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

version: "3.9"

services:

  # ----------------------
  # PostgreSQL - DEVELOPMENT
  # ----------------------
  postgres:
    image: postgres:15-alpine
    container_name: caliweura_postgres
    env_file:
      - .env.development
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/init_warehouse.sql:/docker-entrypoint-initdb.d/02-warehouse.sql
      - ./scripts/init_users.sql:/docker-entrypoint-initdb.d/03-users.sql
    ports:
      - "5432:5432"
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - dp_backend
      - dp_data

  # ----------------------
  # MinIO (Data Lake) - DEVELOPMENT
  # ----------------------
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: caliweura_minio
    env_file:
      - .env.development
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - dp_data

  # ----------------------
  # Spark (Single Node) - DEVELOPMENT
  # ----------------------
  spark_master:
    image: apache/spark:3.4.1
    container_name: caliweura_spark_master
    env_file:
      - .env.development
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: no
      SPARK_RPC_ENCRYPTION_ENABLED: no
      SPARK_SSL_ENABLED: no
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./spark_jobs:/opt/spark/jobs
      - ./data:/data
      - spark_logs:/var/log/spark
    mem_limit: 1g
    cpus: 0.8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/applications"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - dp_data

  # ----------------------
  # Redis (for future CeleryExecutor migration) - DEVELOPMENT
  # ----------------------
  redis:
    image: redis:7-alpine
    container_name: caliweura_redis
    ports:
      - "6379:6379"
    mem_limit: 256m
    cpus: 0.3
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - dp_backend

  # ----------------------
  # Airflow Init - DEVELOPMENT
  # ----------------------
  airflow-init:
    build:
      context: ./docker
      dockerfile: Dockerfile.airflow
    image: caliweura-airflow:latest
    container_name: caliweura_airflow_init
    env_file:
      - .env.development
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    entrypoint: >
      bash -c "
      airflow db upgrade &&
      airflow users create \
        --username admin \
        --firstname Admin \
        --lastname User \
        --role Admin \
        --email admin@airflow.local \
        --password ${AIRFLOW_ADMIN_PASSWORD:-admin123} || true
      "
    restart: "no"
    networks:
      - dp_backend

  # ----------------------
  # Airflow Webserver - DEVELOPMENT
  # ----------------------
  airflow-web:
    build:
      context: ./docker
      dockerfile: Dockerfile.airflow
    image: caliweura-airflow:latest
    container_name: caliweura_airflow_webserver
    env_file:
      - .env.development
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./scripts:/opt/airflow/scripts
      - ./configs:/opt/airflow/configs
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    mem_limit: 1g
    cpus: 0.8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - dp_backend
      - dp_frontend

  # ----------------------
  # Airflow Scheduler - DEVELOPMENT
  # ----------------------
  airflow-scheduler:
    build:
      context: ./docker
      dockerfile: Dockerfile.airflow
    image: caliweura-airflow:latest
    container_name: caliweura_airflow_scheduler
    env_file:
      - .env.development
    depends_on:
      airflow-web:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./scripts:/opt/airflow/scripts
      - ./configs:/opt/airflow/configs
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    mem_limit: 1g
    cpus: 0.8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - dp_backend

  # ----------------------
  # Kafka (OPTIONAL) - DEVELOPMENT
  # ----------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dp_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    mem_limit: 256m
    cpus: 0.3
    restart: unless-stopped
    networks:
      - dp_data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dp_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - dp_data

volumes:
  postgres_data:
  minio_data:
  airflow_logs:
  spark_logs:

networks:
  dp_backend:
    driver: bridge
  dp_frontend:
    driver: bridge
  dp_data:
    driver: bridge
